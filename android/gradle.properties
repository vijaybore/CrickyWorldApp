# Project-wide Gradle settings.
android.useAndroidX=true
reactNativeArchitectures=arm64-v8a
hermesEnabled=true
edgeToEdgeEnabled=false
newArchEnabled=false



# JVM args — single entry, no duplicates
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 -Dhttps.protocols=TLSv1.2,TLSv1.3

# TLS fix
systemProp.https.protocols=TLSv1.2,TLSv1.3
systemProp.http.protocols=TLSv1.2,TLSv1.3

# Keystore
MYAPP_UPLOAD_STORE_FILE=my-upload-key.keystore
MYAPP_UPLOAD_KEY_ALIAS=my-key-alias
MYAPP_UPLOAD_STORE_PASSWORD=Vijay2903
MYAPP_UPLOAD_KEY_PASSWORD=Vijay2903

android.suppressUnsupportedCompileSdk=36